          </safe-output-tools>
          GH_AW_PROMPT_c9dc945ec43bc7ce_EOF
          cat "${RUNNER_TEMP}/gh-aw/prompts/mcp_cli_tools_prompt.md"
          cat << 'GH_AW_PROMPT_c9dc945ec43bc7ce_EOF'
          <github-context>
