      - name: Install AWF binary
        run: bash "${RUNNER_TEMP}/gh-aw/actions/install_awf_binary.sh" v0.27.11
      - name: Execute GitHub Copilot CLI
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        continue-on-error: true
        id: detection_agentic_execution
        # Copilot CLI tool arguments (sorted):
        timeout-minutes: 20
        run: |
          set -o pipefail
          printf '%s' "$(date +%s%3N)" > /tmp/gh-aw/agent_cli_start_ms.txt
          trap 'rm -f "$HOME/.copilot/settings.json"' EXIT
          mkdir -p "$HOME/.copilot"
          printf '%s' '{"builtInAgents":{"rubberDuck":false}}' > "$HOME/.copilot/settings.json"
          export XDG_CONFIG_HOME="$HOME"
          touch /tmp/gh-aw/agent-step-summary.md
          GH_AW_NODE_BIN=$(command -v node 2>/dev/null || true)
          export GH_AW_NODE_BIN
          export COPILOT_API_KEY="$COPILOT_DUMMY_BYOK"
          (umask 177 && touch /tmp/gh-aw/threat-detection/detection.log)
          GH_AW_MAX_AI_CREDITS="${GH_AW_MAX_AI_CREDITS:-400}"
          printf '%s\n' "{\"\$schema\":\"https://github.com/github/gh-aw-firewall/releases/download/v0.27.11/awf-config.schema.json\",\"network\":{\"allowDomains\":[\"api.business.githubcopilot.com\",\"api.enterprise.githubcopilot.com\",\"api.github.com\",\"api.githubcopilot.com\",\"api.individual.githubcopilot.com\",\"github.com\",\"host.docker.internal\",\"registry.npmjs.org\",\"telemetry.enterprise.githubcopilot.com\"]},\"apiProxy\":{\"enabled\":true,\"enableTokenSteering\":true,\"maxRuns\":500,\"maxAiCredits\":${GH_AW_MAX_AI_CREDITS},\"maxCacheMisses\":5},\"container\":{\"imageTag\":\"0.27.11,squid=sha256:ff27ea0525ad953a6adee28a5fbe9d2e22be47dbec755c15767af4ea3f91df7d,agent=sha256:979723c628182da7729333f2208bb249fd25ddee579645cf9a3892d681a929c7,api-proxy=sha256:807e4831999b44513b0a66e5859d478dc4da7ae74ab1918cec967d513f95bf9d\"}}" > "${RUNNER_TEMP}/gh-aw/awf-config.json"
          cp "${RUNNER_TEMP}/gh-aw/awf-config.json" /tmp/gh-aw/awf-config.json
          export GH_AW_MODELS_JSON_PATH="/tmp/gh-aw/models.json"
          GH_AW_DOCKER_HOST=""
          if [[ "${DOCKER_HOST:-}" =~ ^tcp:// ]]; then
            GH_AW_DOCKER_HOST="${DOCKER_HOST}"
          fi
          GH_AW_DOCKER_HOST_PATH_PREFIX_ARGS=""
          if [[ "${DOCKER_HOST:-}" =~ ^tcp:// ]]; then
            GH_AW_DOCKER_HOST_PATH_PREFIX_ARGS="--docker-host-path-prefix /tmp/gh-aw"
            _GH_AW_CHROOT_JSON=$(jq -c --arg src /tmp/gh-aw --arg user "$(id -un)" --argjson uid "$(id -u)" --argjson gid "$(id -g)" --arg home /tmp/gh-aw/home '.chroot={"binariesSourcePath":$src,"identity":{"user":$user,"uid":$uid,"gid":$gid,"home":$home}}' "${RUNNER_TEMP}/gh-aw/awf-config.json") || { echo "chroot config patch failed" >&2; exit 1; }
            printf '%s\n' "$_GH_AW_CHROOT_JSON" > "${RUNNER_TEMP}/gh-aw/awf-config.json"
            printf '%s\n' "$_GH_AW_CHROOT_JSON" > "/tmp/gh-aw/awf-config.json"
          fi
          GH_AW_TOOL_CACHE_MOUNT=""
          GH_AW_TOOL_CACHE="${RUNNER_TOOL_CACHE:?RUNNER_TOOL_CACHE must be set}"
          if [ -d "$GH_AW_TOOL_CACHE" ]; then
            if [[ "$GH_AW_TOOL_CACHE" != /opt/* ]]; then
              GH_AW_TOOL_CACHE_MOUNT="$GH_AW_TOOL_CACHE:$GH_AW_TOOL_CACHE:ro"
            fi
          fi
          # shellcheck disable=SC1003,SC2086
          sudo -E awf --config "${RUNNER_TEMP}/gh-aw/awf-config.json" --container-workdir "${GITHUB_WORKSPACE}" --mount "${RUNNER_TEMP}/gh-aw:${RUNNER_TEMP}/gh-aw:ro" --mount "${RUNNER_TEMP}/gh-aw:/host${RUNNER_TEMP}/gh-aw:ro" ${GH_AW_TOOL_CACHE_MOUNT:+--mount "$GH_AW_TOOL_CACHE_MOUNT"} ${GH_AW_DOCKER_HOST:+--docker-host "$GH_AW_DOCKER_HOST"} ${GH_AW_DOCKER_HOST_PATH_PREFIX_ARGS} --env-all --exclude-env COPILOT_GITHUB_TOKEN --log-level info --proxy-logs-dir /tmp/gh-aw/sandbox/firewall/logs --audit-dir /tmp/gh-aw/sandbox/firewall/audit --enable-host-access --allow-host-ports 80,443,8080 --skip-pull \
            -- /bin/bash -c 'set +o histexpand; : "${RUNNER_TOOL_CACHE:?RUNNER_TOOL_CACHE must be set}"; GH_AW_TOOL_CACHE="$RUNNER_TOOL_CACHE"; export PATH="$(find "$GH_AW_TOOL_CACHE" -maxdepth 5 -type d -name bin 2>/dev/null | tr '\''\n'\'' '\'':'\'')$PATH"; [ -n "$GOROOT" ] && export PATH="$GOROOT/bin:$PATH" || true && GH_AW_NODE_EXEC="${GH_AW_NODE_BIN:-}"; if [ -z "$GH_AW_NODE_EXEC" ] || [ ! -x "$GH_AW_NODE_EXEC" ]; then GH_AW_NODE_EXEC="$(command -v node 2>/dev/null || true)"; fi; if [ -z "$GH_AW_NODE_EXEC" ]; then echo "node runtime missing on this runner — check runtimes.node in workflow YAML" >&2; exit 127; fi; GH_AW_NPM_GLOBAL_ROOT="$(npm root -g 2>/dev/null || true)"; if [ -n "$GH_AW_NPM_GLOBAL_ROOT" ]; then export NODE_PATH="${GH_AW_NPM_GLOBAL_ROOT}${NODE_PATH:+:${NODE_PATH}}"; fi; "$GH_AW_NODE_EXEC" ${RUNNER_TEMP}/gh-aw/actions/copilot_harness.cjs /usr/local/bin/copilot --add-dir /tmp/gh-aw/ --log-level all --log-dir /tmp/gh-aw/sandbox/agent/logs/ --disable-builtin-mcps --no-ask-user --allow-all-tools --add-dir "${GITHUB_WORKSPACE}" --prompt-file /tmp/gh-aw/aw-prompts/prompt.txt' 2>&1 | tee -a /tmp/gh-aw/threat-detection/detection.log
        env:
          AWF_REFLECT_ENABLED: 1
          COPILOT_AGENT_RUNNER_TYPE: STANDALONE
          COPILOT_DUMMY_BYOK: dummy-byok-key-for-offline-mode
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MODEL: claude-sonnet-4.6
          GH_AW_LLM_PROVIDER: github
          GH_AW_MAX_AI_CREDITS: ${{ vars.GH_AW_DEFAULT_DETECTION_MAX_AI_CREDITS || '400' }}
          GH_AW_MAX_TURNS: ${{ vars.GH_AW_DEFAULT_MAX_TURNS || '' }}
          GH_AW_PHASE: detection
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
          GH_AW_TIMEOUT_MINUTES: 20
          GH_AW_VERSION: v0.81.6
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_AW: true
          GITHUB_COPILOT_INTEGRATION_ID: agentic-workflows
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_STEP_SUMMARY: /tmp/gh-aw/agent-step-summary.md
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          RUNNER_TEMP: ${{ runner.temp }}
          TRACEPARENT: ${{ env.GITHUB_AW_OTEL_TRACE_ID != '' && env.GITHUB_AW_OTEL_PARENT_SPAN_ID != '' && format('00-{0}-{1}-01', env.GITHUB_AW_OTEL_TRACE_ID, env.GITHUB_AW_OTEL_PARENT_SPAN_ID) || '' }}
      - name: Parse threat detection token usage for step summary
        id: parse_detection_token_usage
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_TOKEN_USAGE_SUMMARY_TITLE: Threat Detection Token Usage
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/parse_token_usage.cjs');
            await main();
      - name: Upload threat detection log
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: detection
          path: /tmp/gh-aw/threat-detection/detection.log
          if-no-files-found: ignore
      - name: Parse and conclude threat detection
        id: detection_conclusion
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_DETECTION: ${{ steps.detection_guard.outputs.run_detection }}
          DETECTION_AGENTIC_EXECUTION_OUTCOME: ${{ steps.detection_agentic_execution.outcome }}
          GH_AW_DETECTION_CONTINUE_ON_ERROR: "true"
        with:
          script: |
            try {
              const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
              setupGlobals(core, github, context, exec, io, getOctokit);
              const { main } = require('${{ runner.temp }}/gh-aw/actions/parse_threat_detection_results.cjs');
              await main();
            } catch (loadErr) {
              const continueOnError = process.env.GH_AW_DETECTION_CONTINUE_ON_ERROR !== 'false';
              const detectionExecutionFailed = process.env.DETECTION_AGENTIC_EXECUTION_OUTCOME === 'failure';
              const msg = 'ERR_SYSTEM: \u274C Unexpected error loading threat detection module: ' + (loadErr && loadErr.message ? loadErr.message : String(loadErr));
              core.error(msg);
              core.setOutput('reason', 'parse_error');
              if (continueOnError && !detectionExecutionFailed) {
                core.warning('\u26A0\uFE0F ' + msg);
                core.setOutput('conclusion', 'warning');
                core.setOutput('success', 'false');
              } else {
                core.setOutput('conclusion', 'failure');
                core.setOutput('success', 'false');
                core.setFailed(msg);
              }
            }

  pre_activation:
    if: "(github.event_name != 'issue_comment' && github.event_name != 'pull_request_review_comment' || contains(fromJSON('[\"OWNER\",\"MEMBER\",\"COLLABORATOR\"]'), github.event.comment.author_association)) && (github.event_name == 'issue_comment' && (startsWith(github.event.comment.body, '/e2e-test ') || startsWith(github.event.comment.body, '/e2e-test\n') || github.event.comment.body == '/e2e-test') && github.event.issue.pull_request != null)"
    runs-on: ubuntu-slim
    env:
      GH_AW_RUNTIME_FEATURES: ${{ vars.GH_AW_RUNTIME_FEATURES }}
    outputs:
      activated: ${{ steps.check_membership.outputs.is_team_member == 'true' && steps.check_command_position.outputs.command_position_ok == 'true' }}
      matched_command: ${{ steps.check_command_position.outputs.matched_command }}
      setup-parent-span-id: ${{ steps.setup.outputs.parent-span-id || steps.setup.outputs.span-id }}
      setup-span-id: ${{ steps.setup.outputs.span-id }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba6380cc6e5be5d21677bebe04d52fb48e3abec7 # v0.81.6
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "e2e-feature-test"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/e2e-feature-test.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "1.0.65"
          GH_AW_INFO_AWF_VERSION: "v0.27.11"
          GH_AW_INFO_ENGINE_ID: "copilot"
      - name: Check team membership for command workflow
        id: check_membership
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_REQUIRED_ROLES: "admin,maintainer,write"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/check_membership.cjs');
            await main();
      - name: Check command position
        id: check_command_position
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_COMMANDS: "[\"e2e-test\"]"
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/check_command_position.cjs');
            await main();

  publish_review:
    needs:
      - agent
      - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'publish_review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download agent output artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: ${{ runner.temp }}/gh-aw/safe-jobs/
      - name: Upsert the review comment
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");
          const marker = "<!-- e2e-feature-test-review -->";
          const stateOpen = "<!-- e2e-state-b64:";
          const stateClose = "-->";
          const repo = process.env.GITHUB_REPOSITORY;
          const out = JSON.parse(fs.readFileSync(process.env.GH_AW_AGENT_OUTPUT, "utf8"));
          const item = (out.items || []).find((i) => i.type === "publish_review");
          if (!item) {
            console.log("No publish_review item in agent output; nothing to do.");
            process.exit(0);
          }
          const g = (k) => (item[k] == null ? "" : String(item[k]));
          // Cap agent-provided text so neither the embedded state nor the rendered
          // comment can exceed GitHub's ~65k issue-comment limit. Each field is carried
          // BOTH in the base64 state header and in the rendered body, so keep the cap
          // well under that ceiling.
          const FIELD_CAP = 3000;
          const capField = (s) => {
            s = s == null ? "" : String(s);
            return s.length <= FIELD_CAP ? s : s.slice(0, FIELD_CAP) + `\n\n_…truncated ${s.length - FIELD_CAP} characters._`;
          };
          const pr = g("pr_number");
          if (!pr) {
            console.log("No pr_number provided; nothing to do.");
            process.exit(0);
          }
          if (!/^\d+$/.test(pr)) {
            console.log(`Refusing to act on non-numeric pr_number ${JSON.stringify(pr)}.`);
            process.exit(0);
          }
          const api = (args) => execFileSync("gh", ["api", ...args], { encoding: "utf8" });

          // Find the single managed comment and parse its embedded state (if any). Match
          // BOTH the marker and the author so a user-posted comment that happens to
          // contain the marker can't hijack/mis-target the workflow's comment — only the
          // github-actions[bot] comment this job writes is ever edited.
          const existingId = api([
            `repos/${repo}/issues/${pr}/comments`,
            "--paginate",
            "--jq",
            `[.[] | select(.user.login == "github-actions[bot]" and (.body | contains("${marker}")))][0].id // empty`,
          ]).trim();
          let state = { reviewed: null, latest: null };
          if (existingId) {
            const existingBody = api([`repos/${repo}/issues/comments/${existingId}`, "--jq", ".body"]);
            const i = existingBody.indexOf(stateOpen);
            if (i !== -1) {
              const j = existingBody.indexOf(stateClose, i);
              try {
                // State is stored base64-encoded so agent-provided fields can never emit
                // the "-->" close marker and truncate/corrupt the payload.
                const encoded = existingBody.slice(i + stateOpen.length, j).trim();
                state = JSON.parse(Buffer.from(encoded, "base64").toString("utf8"));
              } catch (_) {}
            }
          }

          // Merge this run into the state instead of overwriting. A pass/fail review is
          // the only thing that becomes the comment body; ANY skip is non-destructive —
          // it just advances the "latest commit seen" pointer and keeps the last real
          // review.
          const commit = { sha: g("commit_sha"), subject: g("commit_subject") };
          const status = g("status");
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const aic = (process.env.AIC_USAGE || "").trim();
          // Commit date drives forward-only ordering; fall back to "now" if unfetchable.
          let commitDate = new Date().toISOString();
          if (commit.sha) {
            try {
              commitDate = api([`repos/${repo}/commits/${commit.sha}`, "--jq", ".commit.committer.date"]).trim() || commitDate;
            } catch (_) {}
          }
          commit.date = commitDate;
          // Decide whether `incoming` should replace `stored` in the ordering. Prefer the
          // commit graph so rebases / cherry-picks (whose new head can carry an OLDER
          // committer date than the commit it replaces) still order correctly: ask the
          // compare API how `incoming` relates to `stored`.
          //   - ahead / identical → incoming is the same or a descendant → it supersedes.
          //   - behind            → incoming is an ancestor of stored → it does NOT.
          //   - diverged / API error / missing sha → fall back to committer date.
          // Committer date is only the fallback, so a stale run that can't be ordered by
          // graph still can't clobber a strictly-newer result, and — combined with the
          // fail-closed checkout (a run that can't check out its commit emits a skip,
          // never a base-branch pass/fail) — the comment stays order-independent.
          const compareStatus = (base, head) => {
            try {
              return api([`repos/${repo}/compare/${base}...${head}`, "--jq", ".status"]).trim();
            } catch (_) {
              return "";
            }
          };
          const supersedes = (incoming, stored) => {
            if (!stored || !stored.date) return true;
            if (incoming.sha === stored.sha) return true;
            if (incoming.sha && stored.sha) {
              const rel = compareStatus(stored.sha, incoming.sha);
              if (rel === "ahead" || rel === "identical") return true;
              if (rel === "behind") return false;
              // "diverged" or unavailable → fall through to committer-date comparison.
            }
            return incoming.date > stored.date;
          };

          if (status === "skip") {
            const cand = {
              ...commit,
              skip_reason: capField(g("skip_reason")) || "no end-to-end test was run",
              aic,
              run_url: runUrl,
            };
            if (supersedes(cand, state.latest)) state.latest = cand;
          } else {
            const review = {
              ...commit,
              status,
              headline: capField(g("headline")),
              as_intended: capField(g("as_intended")),
              antagonistic: capField(g("antagonistic")),
              edge_cases: capField(g("edge_cases")),
              random: capField(g("random")),
              action_items: capField(g("action_items")),
              aic,
              run_url: runUrl,
            };
            // A newer (or same-commit) review supersedes; stale older-commit reviews don't.
            if (supersedes(review, state.reviewed)) state.reviewed = review;
            // Advance "latest" only to the newest commit seen.
            if (supersedes(commit, state.latest)) state.latest = { ...commit };
          }

          const short = (s) => (s || "").slice(0, 7);
          const commitDesc = (c) => `\`${short(c.sha)}\`${c.subject ? " — " + c.subject : ""}`;

          const r = state.reviewed; // latest FUNCTIONAL review (pass/fail) — the body highlight
          const l = state.latest; // latest commit the workflow processed (may be a skip, or == r)
          // State is base64-encoded so agent-provided fields can never contain the "-->"
          // close marker and corrupt the payload on the next read.
          const stateEncoded = Buffer.from(JSON.stringify(state), "utf8").toString("base64");
          let body = `${marker}\n${stateOpen} ${stateEncoded} ${stateClose}\n`;

          const footer = (src) => {
            let f = `---\n\n<sub>`;
            if (src && src.aic) f += `⌁ ${src.aic} AI credits · `;
            f += `Advisory only — does not block merge.`;
            if (src && src.run_url) f += ` [Run details](${src.run_url})`;
            f += ` · Comment <code>/e2e-test</code> to re-run.</sub>`;
            return f;
          };

          if (!r) {
            // No functional review yet — only skips have been seen so far.
            body += `# ⏭️ E2E Feature Review\n\n`;
            body += l && l.sha ? `**Latest commit reviewed:** ${commitDesc(l)} _(⏭️ skipped)_\n\n` : "";
            body += `---\n\n> ⏭️ **Skipped — no functional review yet.** ${(l && l.skip_reason) || "No end-to-end test has run yet."}\n\n`;
            body += footer(l);
          } else {
            // The body highlights the latest FUNCTIONAL review; r.status is "pass" or "fail".
            // The top line states the latest commit the workflow saw and how it relates to
            // the review below — either it IS the reviewed commit, or it is a newer commit
            // that was skipped (so the last functional review is preserved and shown).
            body += `# ${r.status === "pass" ? "✅" : "❌"} E2E Feature Review\n\n`;
            if (l && l.sha && l.sha !== r.sha) {
              body += `**Latest commit reviewed:** ${commitDesc(l)} _(⏭️ ${l.skip_reason || "skipped — no functional change"})_\n\n`;
              body += `> Showing the latest functional review below (commit ${commitDesc(r)}); the newer commit above added no functional change.\n\n`;
            } else {
              body += `**Latest commit reviewed:** ${commitDesc(r)} _(reviewed below)_\n\n`;
            }
            body += `---\n\n### ${r.headline}\n\n`;
            body += `### 🔬 What was tested\n\n`;
            const section = (title, content) =>
              `<details>\n<summary><h3>${title}</h3></summary>\n\n${content || "_No findings recorded._"}\n\n</details>\n\n`;
            body += section("🎯 As intended", r.as_intended);
            body += section("😈 Antagonistically", r.antagonistic);
            body += section("🧪 Edge cases", r.edge_cases);
            body += section("🎲 Random", r.random);
            body += `---\n\n### 📌 Key findings & action items\n\n`;
            body += ((r.action_items || "").trim() || "_No action items — feature behaved as expected._") + "\n\n";
            body += footer(r);
          }

          // Last-resort guard against GitHub's ~65k comment limit. The base64 state
          // header sits at the top, so trimming the tail preserves the parseable state
          // even in the pathological case where per-field caps still aren't enough.
          const MAX_BODY = 64000;
          if (body.length > MAX_BODY) {
            body = body.slice(0, MAX_BODY) + "\n\n_…comment truncated to fit GitHub's size limit._";
          }
          fs.writeFileSync("/tmp/e2e-review-body.md", body);
          if (existingId) {
            api([`repos/${repo}/issues/comments/${existingId}`, "-X", "PATCH", "-F", "body=@/tmp/e2e-review-body.md"]);
            console.log(`Updated existing review comment ${existingId}.`);
          } else {
            api([`repos/${repo}/issues/${pr}/comments`, "-X", "POST", "-F", "body=@/tmp/e2e-review-body.md"]);
            console.log("Created review comment.");
          }
          NODE
        env:
          AIC_USAGE: ${{ needs.agent.outputs.aic }}
          GH_AW_AGENT_OUTPUT: ${{ runner.temp }}/gh-aw/safe-jobs/agent_output.json
          GH_TOKEN: ${{ github.token }}

  safe_outputs:
    needs:
      - activation
      - agent
      - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && needs.detection.result == 'success'
    runs-on: ubuntu-slim
    permissions: {}
    timeout-minutes: 45
    env:
      GH_AW_AGENT_AIC: ${{ needs.agent.outputs.aic }}
      GH_AW_AIC: ${{ needs.agent.outputs.aic }}
      GH_AW_AMBIENT_CONTEXT: ${{ needs.agent.outputs.ambient_context }}
      GH_AW_CALLER_WORKFLOW_ID: "${{ github.repository }}/e2e-feature-test"
      GH_AW_COMMANDS: "[\"e2e-test\"]"
      GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
      GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      GH_AW_EFFECTIVE_TOKENS: ${{ needs.agent.outputs.effective_tokens }}
      GH_AW_ENGINE_ID: "copilot"
      GH_AW_ENGINE_MODEL: "claude-sonnet-4.6"
      GH_AW_ENGINE_VERSION: "1.0.65"
      GH_AW_RUNTIME_FEATURES: ${{ vars.GH_AW_RUNTIME_FEATURES }}
      GH_AW_THREAT_DETECTION_AIC: ${{ needs.detection.outputs.aic }}
      GH_AW_WORKFLOW_ID: "e2e-feature-test"
      GH_AW_WORKFLOW_NAME: "e2e-feature-test"
      GH_AW_WORKFLOW_SOURCE_URL: "${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/.github/workflows/e2e-feature-test.md"
    outputs:
      code_push_failure_count: ${{ steps.process_safe_outputs.outputs.code_push_failure_count }}
      code_push_failure_errors: ${{ steps.process_safe_outputs.outputs.code_push_failure_errors }}
      create_discussion_error_count: ${{ steps.process_safe_outputs.outputs.create_discussion_error_count }}
      create_discussion_errors: ${{ steps.process_safe_outputs.outputs.create_discussion_errors }}
      process_safe_outputs_processed_count: ${{ steps.process_safe_outputs.outputs.processed_count }}
      process_safe_outputs_temporary_id_map: ${{ steps.process_safe_outputs.outputs.temporary_id_map }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba6380cc6e5be5d21677bebe04d52fb48e3abec7 # v0.81.6
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
          parent-span-id: ${{ needs.activation.outputs.setup-parent-span-id || needs.activation.outputs.setup-span-id }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "e2e-feature-test"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/e2e-feature-test.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "1.0.65"
          GH_AW_INFO_AWF_VERSION: "v0.27.11"
          GH_AW_INFO_ENGINE_ID: "copilot"
      - name: Download agent output artifact
        id: download-agent-output
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Setup agent output environment variable
        id: setup-agent-output-env
        if: steps.download-agent-output.outcome == 'success'
        run: |
          mkdir -p /tmp/gh-aw/
          find "/tmp/gh-aw/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Configure GH_HOST for enterprise compatibility
        id: ghes-host-config
        shell: bash
        run: | # zizmor: ignore[github-env] - GITHUB_SERVER_URL is set by GitHub Actions, not user input.
          # Derive GH_HOST from GITHUB_SERVER_URL so the gh CLI targets the correct
          # GitHub instance (GHES/GHEC). On github.com this is a harmless no-op.
          GH_HOST="${GITHUB_SERVER_URL#https://}"
          GH_HOST="${GH_HOST#http://}"
          echo "GH_HOST=${GH_HOST}" >> "$GITHUB_ENV"
      - name: Process Safe Outputs
        id: process_safe_outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
          GH_AW_COMMENT_ID: ${{ needs.activation.outputs.comment_id }}
          GH_AW_ALLOWED_DOMAINS: "api.business.githubcopilot.com,api.enterprise.githubcopilot.com,api.github.com,api.githubcopilot.com,api.individual.githubcopilot.com,api.npms.io,api.snapcraft.io,archive.ubuntu.com,azure.archive.ubuntu.com,bun.sh,cdn.jsdelivr.net,crl.geotrust.com,crl.globalsign.com,crl.identrust.com,crl.sectigo.com,crl.thawte.com,crl.usertrust.com,crl.verisign.com,crl3.digicert.com,crl4.digicert.com,crls.ssl.com,deb.nodesource.com,deno.land,esm.sh,get.pnpm.io,github.com,googleapis.deno.dev,googlechromelabs.github.io,host.docker.internal,json-schema.org,json.schemastore.org,jsr.io,keyserver.ubuntu.com,nodejs.org,npm.pkg.github.com,npmjs.com,npmjs.org,ocsp.digicert.com,ocsp.geotrust.com,ocsp.globalsign.com,ocsp.identrust.com,ocsp.sectigo.com,ocsp.ssl.com,ocsp.thawte.com,ocsp.usertrust.com,ocsp.verisign.com,packagecloud.io,packages.cloud.google.com,packages.microsoft.com,ppa.launchpad.net,raw.githubusercontent.com,registry.bower.io,registry.npmjs.com,registry.npmjs.org,registry.yarnpkg.com,releaseassets.githubusercontent.com,repo.yarnpkg.com,s.symcb.com,s.symcd.com,security.ubuntu.com,skimdb.npmjs.com,storage.googleapis.com,telemetry.enterprise.githubcopilot.com,telemetry.vercel.com,ts-crl.ws.symantec.com,ts-ocsp.ws.symantec.com,www.googleapis.com,www.npmjs.com,www.npmjs.org,yarnpkg.com"
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          GH_AW_SAFE_OUTPUT_JOBS: "{\"publish_review\":\"\"}"
          GH_AW_SAFE_OUTPUTS_HANDLER_CONFIG: "{\"missing_data\":{}}"
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/safe_output_handler_manager.cjs');
            await main();
      - name: Upload Safe Outputs Items
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safe-outputs-items
          path: |
            /tmp/gh-aw/safe-output-items.jsonl
            /tmp/gh-aw/temporary-id-map.json
          if-no-files-found: ignore

  update_cache_memory:
    needs:
      - activation
      - agent
      - detection
    if: always() && needs.detection.result == 'success' && needs.agent.result == 'success'
    runs-on: ubuntu-slim
    permissions: {}
    env:
      GH_AW_RUNTIME_FEATURES: ${{ vars.GH_AW_RUNTIME_FEATURES }}
      GH_AW_WORKFLOW_ID_SANITIZED: e2efeaturetest
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba6380cc6e5be5d21677bebe04d52fb48e3abec7 # v0.81.6
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
          parent-span-id: ${{ needs.activation.outputs.setup-parent-span-id || needs.activation.outputs.setup-span-id }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "e2e-feature-test"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/e2e-feature-test.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "1.0.65"
          GH_AW_INFO_AWF_VERSION: "v0.27.11"
          GH_AW_INFO_ENGINE_ID: "copilot"
      - name: Download cache-memory artifact (default)
        id: download_cache_default
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: cache-memory
          path: /tmp/gh-aw/cache-memory
      - name: Check if cache-memory folder has content (default)
        id: check_cache_default
        shell: bash
        run: |
          if [ -d "/tmp/gh-aw/cache-memory" ] && [ "$(ls -A /tmp/gh-aw/cache-memory 2>/dev/null)" ]; then
            echo "has_content=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_content=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Save cache-memory to cache (default)
        if: steps.check_cache_default.outputs.has_content == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: memory-none-nopolicy-${{ env.GH_AW_WORKFLOW_ID_SANITIZED }}-${{ github.run_id }}
          path: /tmp/gh-aw/cache-memory

