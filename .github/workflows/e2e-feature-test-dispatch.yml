# e2e-feature-test-dispatch — DISABLED for now (security hardening)
#
# This companion workflow drove the AUTOMATIC path for e2e-feature-test:
#   - placeholder: post a "queued" review comment as soon as a PR opens
#   - dispatch:    after CI passes for a PR, dispatch the agentic review for that commit
#
# Both are commented out for now. The e2e-feature-test workflow currently runs ONLY via
# the /e2e-test slash command, so a maintainer with write access must invoke each review
# manually — no PR code is exercised unattended. To re-enable the automatic path, restore
# the on: triggers and jobs below, and uncomment `workflow_dispatch` + `bots` in
# e2e-feature-test.md.
name: e2e-feature-test-dispatch

# Inert manual-only trigger keeps this a valid workflow file while the automatic path is
# disabled. The single job never runs (if: false).
on:
  workflow_dispatch:

permissions: {}

jobs:
  disabled:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "e2e-feature-test-dispatch is disabled; e2e reviews run only via the /e2e-test slash command."

